<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Outrun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ====== RESET & BASE ====== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --hot-pink: #ff2d95;
  --cyan: #00e5ff;
  --purple: #b14bff;
  --orange: #ff7a00;
  --dark-purple: #0d0015;
  --mid-purple: #1a0030;
  --navy: #050010;
  --card-bg: rgba(10,0,30,0.82);
  --neon-border: 1px solid rgba(255,45,149,0.6);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--navy);
  color: #e0c8ff;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ====== BACKGROUND LAYERS ====== */
#bg-root {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

/* Starfield canvas */
#starfield {
  position: absolute;
  inset: 0;
  z-index: 1;
}

/* Sunset gradient */
#sunset {
  position: absolute;
  inset: 0;
  z-index: 2;
  background:
    radial-gradient(ellipse 70% 40% at 50% 48%, rgba(255,122,0,0.55) 0%, transparent 70%),
    radial-gradient(ellipse 50% 28% at 50% 50%, rgba(255,45,149,0.7) 0%, transparent 60%),
    linear-gradient(to bottom,
      #060010 0%,
      #120025 18%,
      #2a0a4a 33%,
      #5a1a3a 46%,
      #b33a00 54%,
      #ff7a00 58%,
      #ff2d95 62%,
      #c0186a 66%,
      #4a0a3a 72%,
      #1a0030 80%,
      #0d0015 100%
    );
}

/* Sun disc with shimmer */
#sun {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: linear-gradient(to bottom, #ffe066 0%, #ff9900 30%, #ff4400 55%, #ff2d95 75%, #c0186a 100%);
  box-shadow:
    0 0 40px 20px rgba(255,180,0,0.5),
    0 0 100px 50px rgba(255,100,0,0.35),
    0 0 200px 100px rgba(255,45,149,0.2);
  animation: sun-shimmer 4s ease-in-out infinite;
}

/* Horizontal stripes across sun for retro look */
#sun::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 14px,
    rgba(0,0,10,0.55) 14px,
    rgba(0,0,10,0.55) 18px
  );
  /* clip bottom half */
  clip-path: inset(50% 0 0 0);
}

@keyframes sun-shimmer {
  0%,100% { box-shadow: 0 0 40px 20px rgba(255,180,0,0.5), 0 0 100px 50px rgba(255,100,0,0.35), 0 0 200px 100px rgba(255,45,149,0.2); }
  33% { box-shadow: 0 0 60px 30px rgba(255,200,0,0.65), 0 0 130px 60px rgba(255,120,0,0.4), 0 0 240px 120px rgba(255,45,149,0.28); }
  66% { box-shadow: 0 0 35px 15px rgba(255,150,0,0.45), 0 0 90px 40px rgba(255,80,0,0.3), 0 0 180px 90px rgba(177,75,255,0.22); }
}

/* Horizon glow bar */
#horizon {
  position: absolute;
  z-index: 4;
  left: 0; right: 0;
  top: 58%;
  height: 3px;
  background: linear-gradient(to right, transparent, #ff2d95 20%, #ff7a00 40%, #ffe066 50%, #ff7a00 60%, #ff2d95 80%, transparent);
  box-shadow: 0 0 18px 6px rgba(255,45,149,0.8), 0 0 40px 15px rgba(255,122,0,0.5);
  animation: horizon-pulse 3s ease-in-out infinite;
}

@keyframes horizon-pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.7; }
}

/* ====== PERSPECTIVE GRID FLOOR ====== */
#grid-wrapper {
  position: absolute;
  z-index: 4;
  left: 0; right: 0;
  top: 58%;
  bottom: 0;
  overflow: hidden;
  perspective: 300px;
  perspective-origin: 50% 0%;
}

#grid-surface {
  position: absolute;
  top: 0; left: -40%; right: -40%;
  height: 420%;
  transform-origin: 50% 0%;
  transform: rotateX(82deg);
  animation: grid-scroll 3s linear infinite;
  background-color: transparent;
  background-image:
    linear-gradient(to right, rgba(255,45,149,0.55) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0,229,255,0.45) 1px, transparent 1px);
  background-size: 8% 6%;
}

@keyframes grid-scroll {
  0% { background-position: 0 0; }
  100% { background-position: 0 6%; }
}

/* Fade grid at horizon line */
#grid-wrapper::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(to bottom, rgba(13,0,21,0) 0%, transparent 100%);
  z-index: 5;
}

/* Fade grid at bottom */
#grid-wrapper::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 35%;
  background: linear-gradient(to top, #0d0015 0%, transparent 100%);
  z-index: 5;
}

/* Side vanishing lines */
.vline {
  position: absolute;
  z-index: 6;
  top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, rgba(255,45,149,0.9), rgba(255,45,149,0.1));
  box-shadow: 0 0 8px 2px rgba(255,45,149,0.6);
}
.vline-left { left: 10%; }
.vline-right { right: 10%; }

/* Scanline overlay */
#scanlines {
  position: absolute;
  inset: 0;
  z-index: 8;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.08) 3px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
}

/* Vignette */
#vignette {
  position: absolute;
  inset: 0;
  z-index: 7;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,10,0.7) 100%);
}

/* ====== MAIN CONTENT ====== */
#content {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  padding: 0 clamp(16px, 4vw, 64px) 120px;
  max-width: 1400px;
  margin: 0 auto;
}

/* ====== HERO TITLE ====== */
#hero {
  padding: 48px 0 40px;
  text-align: center;
  position: relative;
}

#hero-eyebrow {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 6px;
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan);
  text-transform: uppercase;
  margin-bottom: 8px;
  animation: flicker 6s step-end infinite;
}

@keyframes flicker {
  0%,96%,100% { opacity: 1; }
  97% { opacity: 0.3; }
  98% { opacity: 1; }
  99% { opacity: 0.5; }
}

#hero-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(48px, 9vw, 96px);
  font-weight: 900;
  line-height: 1;
  letter-spacing: 4px;
  text-transform: uppercase;
  background: linear-gradient(
    to bottom,
    #ffffff 0%,
    #ffe0f5 15%,
    #ff9de2 30%,
    #ff2d95 50%,
    #ff7a00 70%,
    #ffcc00 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter:
    drop-shadow(0 0 6px rgba(255,45,149,0.9))
    drop-shadow(0 0 20px rgba(255,45,149,0.6))
    drop-shadow(0 0 50px rgba(177,75,255,0.4));
  animation: title-pulse 4s ease-in-out infinite;
}

@keyframes title-pulse {
  0%,100% { filter: drop-shadow(0 0 6px rgba(255,45,149,0.9)) drop-shadow(0 0 20px rgba(255,45,149,0.6)) drop-shadow(0 0 50px rgba(177,75,255,0.4)); }
  50% { filter: drop-shadow(0 0 10px rgba(255,45,149,1)) drop-shadow(0 0 35px rgba(255,45,149,0.8)) drop-shadow(0 0 80px rgba(0,229,255,0.5)); }
}

#hero-subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: rgba(177,75,255,0.8);
  letter-spacing: 3px;
  margin-top: 10px;
  text-shadow: 0 0 8px rgba(177,75,255,0.6);
}

/* ====== SECTION WRAPPER ====== */
.section {
  margin-bottom: 36px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(177,75,255,0.2);
  position: relative;
}

.section-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 80px;
  height: 1px;
  background: linear-gradient(to right, var(--hot-pink), var(--purple));
  box-shadow: 0 0 8px var(--hot-pink);
}

.section-label {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--cyan);
  text-shadow: 0 0 8px rgba(0,229,255,0.7);
}

.section-label::before {
  content: '// ';
  color: var(--hot-pink);
  text-shadow: 0 0 6px var(--hot-pink);
}

.section-all {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: rgba(177,75,255,0.7);
  text-decoration: none;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color 0.2s, text-shadow 0.2s;
}
.section-all:hover {
  color: var(--cyan);
  text-shadow: 0 0 8px var(--cyan);
}
.section-all::after { content: ' ›'; }

/* ====== CARD BASE ====== */
.neon-card {
  background: var(--card-bg);
  border: 1px solid rgba(255,45,149,0.35);
  box-shadow:
    0 0 0 1px rgba(0,229,255,0.15),
    inset 0 0 20px rgba(177,75,255,0.05),
    0 0 20px rgba(255,45,149,0.15);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
}

.neon-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 4px;
  border: 1px solid rgba(0,229,255,0.2);
  pointer-events: none;
  z-index: 1;
}

.neon-card:hover {
  transform: translateY(-4px) scale(1.015);
  border-color: rgba(255,45,149,0.8);
  box-shadow:
    0 0 0 1px rgba(0,229,255,0.5),
    0 0 30px rgba(255,45,149,0.5),
    0 0 60px rgba(177,75,255,0.3),
    0 8px 40px rgba(0,0,20,0.8);
}

/* RGB shimmer on hover */
.neon-card:hover::before {
  border-color: rgba(0,229,255,0.6);
  box-shadow: inset 0 0 15px rgba(0,229,255,0.1);
}

/* ====== HORIZONTAL SCROLL ROW ====== */
.h-scroll {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  overflow-y: visible;
  padding: 8px 4px 14px;
  cursor: grab;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.h-scroll::-webkit-scrollbar { display: none; }
.h-scroll.dragging { cursor: grabbing; user-select: none; }

/* ====== STEAM / WISHLIST CARDS ====== */
.game-card {
  flex: 0 0 220px;
  width: 220px;
}

.game-cover {
  width: 100%;
  height: 103px;
  object-fit: cover;
  display: block;
  filter: saturate(1.1) contrast(1.05);
}

.game-cover-wrap {
  position: relative;
  overflow: hidden;
}

.game-cover-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 55%, rgba(5,0,20,0.9) 100%);
}

.game-discount {
  position: absolute;
  top: 7px;
  right: 7px;
  z-index: 2;
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  color: #0d0015;
  background: linear-gradient(135deg, #ff2d95, #ff7a00);
  padding: 3px 7px;
  border-radius: 2px;
  letter-spacing: 1px;
  box-shadow: 0 0 12px rgba(255,45,149,0.8);
}

.game-info {
  padding: 10px 12px 12px;
}

.game-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: #f0d8ff;
  line-height: 1.3;
  margin-bottom: 6px;
  text-shadow: 0 0 6px rgba(177,75,255,0.4);
}

.game-pricing {
  display: flex;
  align-items: center;
  gap: 8px;
}

.game-price {
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--cyan);
  text-shadow: 0 0 8px rgba(0,229,255,0.8);
}

.game-was {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: rgba(177,75,255,0.5);
  text-decoration: line-through;
}

/* ====== LINKS ROW ====== */
.link-card {
  flex: 0 0 140px;
  width: 140px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 8px;
  padding: 14px 12px;
  cursor: pointer;
}

.link-icon-chip {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
  position: relative;
  flex-shrink: 0;
}

.link-icon-chip::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.25);
}

.link-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: #e0c8ff;
  line-height: 1.2;
}

.link-domain {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: rgba(177,75,255,0.5);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
}

.link-arrow {
  font-size: 14px;
  color: rgba(0,229,255,0.5);
  margin-top: auto;
  align-self: flex-end;
}

/* ====== PLAN LIST ====== */
.plan-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.plan-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  border-radius: 4px;
  background: rgba(10,0,30,0.6);
  border: 1px solid rgba(177,75,255,0.2);
  transition: border-color 0.2s;
  position: relative;
  overflow: hidden;
}

.plan-row.is-now {
  border-color: rgba(255,45,149,0.6);
  background: rgba(255,45,149,0.07);
  box-shadow: 0 0 20px rgba(255,45,149,0.15), inset 0 0 20px rgba(255,45,149,0.04);
}

.plan-row.is-now::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--hot-pink), var(--orange));
  box-shadow: 0 0 10px var(--hot-pink);
}

.plan-row.is-past {
  opacity: 0.38;
}

.plan-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--purple);
  box-shadow: 0 0 6px var(--purple);
}

.plan-row.is-now .plan-dot {
  background: var(--hot-pink);
  box-shadow: 0 0 10px var(--hot-pink);
  animation: dot-pulse 1.5s ease-in-out infinite;
}

@keyframes dot-pulse {
  0%,100% { box-shadow: 0 0 6px var(--hot-pink); transform: scale(1); }
  50% { box-shadow: 0 0 16px var(--hot-pink); transform: scale(1.3); }
}

.plan-time {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: rgba(0,229,255,0.6);
  flex-shrink: 0;
  width: 100px;
}

.plan-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: #e0c8ff;
  flex: 1;
}

.plan-location {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: rgba(177,75,255,0.5);
  margin-left: 8px;
}

.plan-now-badge {
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #0d0015;
  background: linear-gradient(135deg, #ff2d95, #ff7a00);
  padding: 3px 8px;
  border-radius: 2px;
  box-shadow: 0 0 12px rgba(255,45,149,0.7);
  animation: badge-glow 2s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes badge-glow {
  0%,100% { box-shadow: 0 0 10px rgba(255,45,149,0.7); }
  50% { box-shadow: 0 0 20px rgba(255,45,149,1), 0 0 40px rgba(255,122,0,0.5); }
}

/* ====== TODO LIST ====== */
.todo-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.todo-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  border-radius: 4px;
  background: rgba(10,0,30,0.6);
  border: 1px solid rgba(177,75,255,0.15);
  transition: border-color 0.2s;
}

.todo-row:hover {
  border-color: rgba(177,75,255,0.4);
}

.todo-priority {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.priority-high { background: #ff3355; box-shadow: 0 0 8px #ff3355; }
.priority-medium { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }
.priority-low { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }

.todo-text {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #e0c8ff;
  flex: 1;
}

.todo-deadline {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: rgba(177,75,255,0.5);
  flex-shrink: 0;
}

/* ====== NEWS CARDS ====== */
.news-card {
  flex: 0 0 160px;
  width: 160px;
  height: 240px;
  position: relative;
  cursor: pointer;
}

.news-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: saturate(1.2) contrast(1.1);
}

.news-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(5,0,20,0.98) 0%, rgba(5,0,20,0.7) 40%, rgba(5,0,20,0.2) 70%, transparent 100%);
  z-index: 1;
}

.news-content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 10px;
  z-index: 2;
}

.news-kicker {
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--hot-pink);
  text-shadow: 0 0 8px var(--hot-pink);
  margin-bottom: 5px;
}

.news-headline {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: #f0d8ff;
  line-height: 1.35;
}

/* ====== BOTTOM BUTTONS ====== */
#bottom-actions {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 50;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.icon-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(10,0,30,0.9);
  border: 1px solid rgba(255,45,149,0.5);
  box-shadow: 0 0 15px rgba(255,45,149,0.3), 0 0 0 1px rgba(0,229,255,0.1);
  cursor: pointer;
  transition: all 0.2s;
  color: rgba(255,45,149,0.9);
  font-size: 18px;
  backdrop-filter: blur(8px);
}

.icon-btn:hover {
  border-color: var(--cyan);
  box-shadow: 0 0 20px rgba(0,229,255,0.5), 0 0 40px rgba(255,45,149,0.3);
  color: var(--cyan);
  transform: scale(1.1);
}

/* ====== NEON SEPARATOR ====== */
.neon-sep {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(177,75,255,0.4), rgba(0,229,255,0.4), transparent);
  margin: 4px 0 28px;
}

/* ====== GRID LAYOUT FOR BOTTOM SECTIONS ====== */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

@media (max-width: 700px) {
  .two-col { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ===== BACKGROUND ===== -->
<div id="bg-root">
  <canvas id="starfield"></canvas>
  <div id="sunset"></div>
  <div id="sun"></div>
  <div id="horizon"></div>
  <div id="grid-wrapper">
    <div id="grid-surface"></div>
    <div class="vline vline-left"></div>
    <div class="vline vline-right"></div>
  </div>
  <div id="vignette"></div>
  <div id="scanlines"></div>
</div>

<!-- ===== CONTENT ===== -->
<div id="content">

  <!-- HERO -->
  <div id="hero">

/* ====== STARFIELD ====== */
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initStars();
  }

  function initStars() {
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 3000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.62,
        r: Math.random() * 1.4 + 0.2,
        alpha: Math.random(),
        speed: Math.random() * 0.015 + 0.003,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const a = s.alpha * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      const hue = Math.random() > 0.85 ? (Math.random() > 0.5 ? '180,0,255' : '0,229,255') : '255,255,255';
      ctx.fillStyle = `rgba(${hue},${a.toFixed(2)})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();

/* ====== DRAG-SCROLL ====== */
document.querySelectorAll('.h-scroll').forEach(el => {
  let isDown = false, startX, scrollLeft;
  el.addEventListener('mousedown', e => {
    isDown = true;
    el.classList.add('dragging');
    startX = e.pageX - el.offsetLeft;
    scrollLeft = el.scrollLeft;
  });
  el.addEventListener('mouseleave', () => { isDown = false; el.classList.remove('dragging'); });
  el.addEventListener('mouseup', () => { isDown = false; el.classList.remove('dragging'); });
  el.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - el.offsetLeft;
    el.scrollLeft = scrollLeft - (x - startX) * 1.3;
  });
});
