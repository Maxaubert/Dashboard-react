<!doctype html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lenkekort - liquid hover v2</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=IBM+Plex+Mono:wght@500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --body:'Space Grotesk',sans-serif; --mono:'IBM Plex Mono',monospace; --display:'Chakra Petch',sans-serif;
          --ink:#0d0d11; --muted:#6b6a62; --line:rgba(13,13,17,0.16); }
  * { box-sizing:border-box; }
  body { margin:0; background:#fff; color:var(--ink); font-family:var(--body); padding:40px 48px 100px; }
  h1 { font-family:var(--display); text-transform:uppercase; font-size:24px; margin:0 0 4px; }
  .sub { color:var(--muted); margin:0 0 36px; font-size:14px; }
  .variant { margin-bottom:46px; }
  .variant-label { font-family:var(--mono); text-transform:uppercase; letter-spacing:.22em; font-size:.66rem; color:var(--muted);
                   border-bottom:1px solid rgba(13,13,17,.12); padding-bottom:8px; display:flex; justify-content:space-between; }
  .variant-note { text-transform:none; letter-spacing:0; font-family:var(--body); }
  .row { display:flex; gap:14px; margin-top:18px; flex-wrap:wrap; }

  .lc { position:relative; width:172px; min-height:104px; padding:14px; background:#fff; border:1px solid var(--line);
        border-radius:2px; overflow:hidden; display:flex; flex-direction:column; justify-content:space-between; isolation:isolate; }
  .lc .top { display:flex; justify-content:space-between; align-items:flex-start; }
  .lc .nm { font-weight:600; font-size:14px; position:relative; z-index:2; transition:color .3s; }
  .lc .dom { font-family:var(--mono); font-size:10px; color:var(--muted); position:relative; z-index:2; transition:color .3s; }
  .icon { width:30px; height:30px; display:grid; place-items:center; font-weight:700; font-size:13px; color:#fff; flex:none; position:relative; z-index:2; }
  .arrow { color:var(--muted); position:relative; z-index:2; }

  /* the liquid layer: full-bleed svg, solid accent, morphing continuously,
     slides into place on hover. */
  .liquid { position:absolute; inset:0; z-index:1; pointer-events:none;
    opacity:0; transition:opacity .25s ease, transform .55s cubic-bezier(.2,.85,.25,1); }
  .liquid svg { width:100%; height:100%; display:block; }
  .liquid path { fill: var(--ac); }

  /* A: wavy tide rising from the bottom */
  .a .liquid { transform: translateY(46%); }
  .a .lc:hover .liquid { opacity:1; transform: translateY(0); }
  .a .lc:hover .nm, .a .lc:hover .dom { color:#fff; }

  /* B: wavy blob sweeping in from bottom-left */
  .b .liquid { transform: translate(-40%,40%) scale(.5); transform-origin:0% 100%; }
  .b .lc:hover .liquid { opacity:1; transform: translate(0,0) scale(1.15); }
  .b .lc:hover .nm, .b .lc:hover .dom { color:#fff; }

  /* C: wavy diagonal flood from top-left */
  .c .liquid { transform: translate(-45%,-45%); }
  .c .lc:hover .liquid { opacity:1; transform: translate(0,0); }
  .c .lc:hover .nm, .c .lc:hover .dom { color:#fff; }
</style>
</head>
<body>
  <h1>Lenkekort - liquid hover v2</h1>
  <p class="sub">Solid aksentfarge, boelgete (vaeske)struktur som morpher og flyter inn ved hover.</p>

  <div class="variant a"><div class="variant-label"><span>A / Boelgetidevann (stiger nedenfra)</span><span class="variant-note">solid, boelgetopp morpher</span></div><div class="row" id="rowA"></div></div>
  <div class="variant b"><div class="variant-label"><span>B / Boelgeblob (sveiper inn fra hjornet)</span><span class="variant-note">organisk fler-lobe blob</span></div><div class="row" id="rowB"></div></div>
  <div class="variant c"><div class="variant-label"><span>C / Diagonal boelgeflom</span><span class="variant-note">boelgekant flommer fra hjornet</span></div><div class="row" id="rowC"></div></div>

  <script>
    const data = [
      { nm:'YouTube', dom:'youtube.com', ic:'#ff0033', t:'YT' },
      { nm:'GitHub', dom:'github.com', ic:'#0d0d11', t:'GH' },
      { nm:'NRK TV', dom:'tv.nrk.no', ic:'#1f6feb', t:'N' },
      { nm:'Telenor', dom:'telenor.no', ic:'#00b9f1', t:'T' },
      { nm:'Spotify', dom:'spotify.com', ic:'#1db954', t:'S' },
    ];
    const ARROW='<svg class="arrow" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M14 3l-1.41 1.41L18.17 10H4v2h14.17l-5.58 5.59L14 19l8-8z"/></svg>';

    // A: rising wavy tide. Morph the top edge between wavy shapes.
    const waveA = `<svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,42 C18,28 32,52 50,42 C68,32 82,54 100,42 L100,100 L0,100 Z">
      <animate attributeName="d" dur="4.5s" repeatCount="indefinite"
        values="M0,42 C18,28 32,52 50,42 C68,32 82,54 100,42 L100,100 L0,100 Z;
                M0,46 C18,56 34,34 50,48 C66,60 84,36 100,48 L100,100 L0,100 Z;
                M0,40 C20,30 34,54 50,40 C66,28 82,52 100,44 L100,100 L0,100 Z;
                M0,42 C18,28 32,52 50,42 C68,32 82,54 100,42 L100,100 L0,100 Z"/></path></svg>`;

    // B: organic multi-lobe blob, morphing.
    const blobB = `<svg viewBox="0 0 100 100"><path d="M52,14 C70,12 78,30 88,40 C96,48 90,64 80,72 C70,80 56,76 42,86 C30,94 16,82 14,66 C12,52 6,42 16,28 C24,16 36,16 52,14 Z">
      <animate attributeName="d" dur="5s" repeatCount="indefinite"
        values="M52,14 C70,12 78,30 88,40 C96,48 90,64 80,72 C70,80 56,76 42,86 C30,94 16,82 14,66 C12,52 6,42 16,28 C24,16 36,16 52,14 Z;
                M50,10 C68,16 84,24 86,42 C88,60 78,66 74,80 C70,94 52,92 38,88 C24,84 14,76 14,60 C14,44 10,34 22,24 C32,16 36,8 50,10 Z;
                M52,14 C70,12 78,30 88,40 C96,48 90,64 80,72 C70,80 56,76 42,86 C30,94 16,82 14,66 C12,52 6,42 16,28 C24,16 36,16 52,14 Z"/></path></svg>`;

    // C: diagonal wavy flood from top-left.
    const floodC = `<svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L70,0 C58,22 84,34 70,52 C58,68 80,82 64,100 L0,100 Z">
      <animate attributeName="d" dur="5s" repeatCount="indefinite"
        values="M0,0 L70,0 C58,22 84,34 70,52 C58,68 80,82 64,100 L0,100 Z;
                M0,0 L66,0 C78,20 56,36 72,54 C86,70 60,84 70,100 L0,100 Z;
                M0,0 L70,0 C58,22 84,34 70,52 C58,68 80,82 64,100 L0,100 Z"/></path></svg>`;

    const make = (svg) => (d) =>
      `<a class="lc" style="--ac:${d.ic}"><div class="liquid">${svg}</div>`+
      `<div class="top"><span class="icon" style="background:${d.ic}">${d.t}</span>${ARROW}</div>`+
      `<div><div class="nm">${d.nm}</div><div class="dom">${d.dom}</div></div></a>`;

    document.getElementById('rowA').innerHTML = data.map(make(waveA)).join('');
    document.getElementById('rowB').innerHTML = data.map(make(blobB)).join('');
    document.getElementById('rowC').innerHTML = data.map(make(floodC)).join('');
  </script>
</body>
</html>
