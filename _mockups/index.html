<!doctype html>
<html lang="nb">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login mockups — A / B / C</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0c; color: #e7e7ea; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
