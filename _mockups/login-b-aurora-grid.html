<!doctype html>
<html lang="nb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login mockup B — Aurora + Dot-grid</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --indigo:#6366f1; --violet:#8b5cf6; --blue:#3b82f6; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #050507; color: #e7e7ea; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .aurora { position: fixed; inset: 0; overflow: hidden; z-index: 0; }
  .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.5; will-change: transform; }
  .b1 { width: 520px; height: 520px; background: var(--indigo); top: -120px; left: -70px; animation: d1 28s ease-in-out infinite alternate; }
  .b2 { width: 460px; height: 460px; background: var(--violet); bottom: -130px; right: -50px; animation: d2 32s ease-in-out infinite alternate; }
  @keyframes d1 { from { transform: translate(0,0) scale(1); } to { transform: translate(120px,70px) scale(1.15); } }
  @keyframes d2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-90px,-60px) scale(1.1); } }
  /* Dot-grid overlay — ties into the dashboard's existing texture */
  .grid { position: fixed; inset: -2px; z-index: 1;
    background-image: radial-gradient(rgba(255,255,255,0.10) 1px, transparent 1px);
    background-size: 26px 26px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    animation: gridpan 40s linear infinite; }
  @keyframes gridpan { from { transform: translateY(0); } to { transform: translateY(26px); } }

  .card {
    position: relative; z-index: 2; width: 360px; max-width: calc(100vw - 32px); padding: 36px 30px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
    backdrop-filter: blur(22px) saturate(135%); -webkit-backdrop-filter: blur(22px) saturate(135%);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
    animation: reveal 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  /* Animated glow border — a soft conic light slowly rotating around the card edge */
  .card::before {
    content: ""; position: absolute; inset: -1px; border-radius: 21px; padding: 1px; z-index: -1;
    background: conic-gradient(from 0deg, transparent 0deg, rgba(99,102,241,0.7) 60deg, transparent 140deg, transparent 360deg);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    animation: spin 6s linear infinite; opacity: 0.8;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes reveal { from { opacity:0; transform: scale(0.95) translateY(10px); } to { opacity:1; transform: scale(1) translateY(0); } }
  .brand { display:flex; align-items:center; gap:9px; color:var(--indigo); font-weight:700; font-size:0.95rem; margin-bottom:22px; }
  h1 { font-size:1.5rem; font-weight:700; margin-bottom:22px; letter-spacing:-0.01em; }
  label { display:block; font-size:0.78rem; color:#a1a1aa; margin-bottom:7px; }
  .field { margin-bottom:16px; }
  input { width:100%; padding:11px 13px; background:rgba(0,0,0,0.28); border:1px solid rgba(255,255,255,0.1);
    border-radius:11px; color:#e7e7ea; font-size:0.95rem; outline:none; transition:border-color .15s, box-shadow .15s; }
  input:focus { border-color:var(--indigo); box-shadow:0 0 0 3px rgba(99,102,241,0.25); }
  button { width:100%; margin-top:6px; padding:12px; background:var(--indigo); color:#fff; border:none; border-radius:11px;
    font-size:0.95rem; font-weight:600; cursor:pointer; box-shadow:0 8px 24px rgba(99,102,241,0.35);
    transition:transform .1s, box-shadow .15s, background .15s; }
  button:hover { background:#7376f5; box-shadow:0 10px 30px rgba(99,102,241,0.5); }
  button:active { transform:translateY(1px); }
  .footer { margin-top:22px; text-align:center; font-size:0.82rem; color:#a1a1aa; }
  .footer a { color:#a5b4fc; text-decoration:none; }
  .tag { position: fixed; bottom: 14px; left: 0; right: 0; text-align: center; z-index: 3; font-size: 0.72rem; color: #52525b; }
</style>
</head>
<body>
  <div class="aurora"><div class="blob b1"></div><div class="blob b2"></div></div>
  <div class="grid"></div>
  <div class="card">
    <div class="brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h7v7H3V3m0 11h7v7H3v-7m11-11h7v7h-7V3m0 11h7v7h-7v-7"/></svg>
      <span>Dashboard</span>
    </div>
    <h1>Logg inn</h1>
    <div class="field"><label>E-post</label><input type="email" placeholder="deg@eksempel.no"></div>
    <div class="field"><label>Passord</label><input type="password" placeholder="••••••••••"></div>
    <button>Logg inn</button>
    <p class="footer">Har du ikke konto? <a href="#">Registrer deg</a></p>
  </div>
  <div class="tag">Mockup B — Aurora + dot-grid (app texture) + rotating glow border on the card</div>
</body>
</html>
