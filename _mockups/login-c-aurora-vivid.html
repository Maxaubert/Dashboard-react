<!doctype html>
<html lang="nb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login mockup C — Aurora Vivid</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --indigo:#6366f1; --violet:#8b5cf6; --blue:#3b82f6; --sky:#38bdf8; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #040409; color: #e7e7ea; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  /* Slow conic sweep behind everything for extra depth */
  .sweep { position: fixed; inset: -40%; z-index: 0; opacity: 0.18;
    background: conic-gradient(from 0deg, transparent, var(--indigo), transparent 40%, var(--violet), transparent 70%);
    filter: blur(40px); animation: sweep 50s linear infinite; }
  @keyframes sweep { to { transform: rotate(360deg); } }
  .aurora { position: fixed; inset: 0; overflow: hidden; z-index: 1; }
  .blob { position: absolute; border-radius: 50%; filter: blur(85px); opacity: 0.6; will-change: transform; }
  .b1 { width: 480px; height: 480px; background: var(--indigo); top: -110px; left: -60px;  animation: d1 22s ease-in-out infinite alternate; }
  .b2 { width: 440px; height: 440px; background: var(--violet); bottom: -120px; right: -40px; animation: d2 26s ease-in-out infinite alternate; }
  .b3 { width: 360px; height: 360px; background: var(--blue);   top: 20%; left: 60%; animation: d3 30s ease-in-out infinite alternate; }
  .b4 { width: 300px; height: 300px; background: var(--sky);    bottom: 18%; left: 12%; opacity: 0.4; animation: d4 28s ease-in-out infinite alternate; }
  @keyframes d1 { from { transform: translate(0,0) scale(1); } to { transform: translate(110px,80px) scale(1.2); } }
  @keyframes d2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-100px,-70px) scale(1.15); } }
  @keyframes d3 { from { transform: translate(0,0) scale(1); } to { transform: translate(-80px,60px) scale(0.85); } }
  @keyframes d4 { from { transform: translate(0,0) scale(1); } to { transform: translate(70px,-50px) scale(1.1); } }
  .vignette { position: fixed; inset: 0; z-index: 2;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 100%); }

  .card {
    position: relative; z-index: 3; width: 360px; max-width: calc(100vw - 32px); padding: 36px 30px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); border-radius: 20px;
    backdrop-filter: blur(26px) saturate(160%); -webkit-backdrop-filter: blur(26px) saturate(160%);
    box-shadow: 0 24px 70px rgba(0,0,0,0.55), 0 0 60px rgba(99,102,241,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
    animation: reveal 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes reveal { from { opacity:0; transform: scale(0.95) translateY(10px); } to { opacity:1; transform: scale(1) translateY(0); } }
  .brand { display:flex; align-items:center; gap:9px; color:#a5b4fc; font-weight:700; font-size:0.95rem; margin-bottom:22px; }
  h1 { font-size:1.55rem; font-weight:700; margin-bottom:22px; letter-spacing:-0.01em;
    background: linear-gradient(90deg, #fff, #c7d2fe); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  label { display:block; font-size:0.78rem; color:#a1a1aa; margin-bottom:7px; }
  .field { margin-bottom:16px; }
  input { width:100%; padding:11px 13px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.12);
    border-radius:11px; color:#e7e7ea; font-size:0.95rem; outline:none; transition:border-color .15s, box-shadow .15s; }
  input:focus { border-color:var(--indigo); box-shadow:0 0 0 3px rgba(99,102,241,0.3); }
  button { width:100%; margin-top:6px; padding:12px; border:none; border-radius:11px;
    background: linear-gradient(90deg, var(--indigo), var(--violet)); color:#fff;
    font-size:0.95rem; font-weight:600; cursor:pointer; box-shadow:0 8px 28px rgba(99,102,241,0.45);
    transition:transform .1s, box-shadow .15s, filter .15s; }
  button:hover { filter:brightness(1.1); box-shadow:0 10px 34px rgba(139,92,246,0.55); }
  button:active { transform:translateY(1px); }
  .footer { margin-top:22px; text-align:center; font-size:0.82rem; color:#a1a1aa; }
  .footer a { color:#a5b4fc; text-decoration:none; }
  .tag { position: fixed; bottom: 14px; left: 0; right: 0; text-align: center; z-index: 4; font-size: 0.72rem; color: #52525b; }
</style>
</head>
<body>
  <div class="sweep"></div>
  <div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div></div>
  <div class="vignette"></div>
  <div class="card">
    <div class="brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h7v7H3V3m0 11h7v7H3v-7m11-11h7v7h-7V3m0 11h7v7h-7v-7"/></svg>
      <span>Dashboard</span>
    </div>
    <h1>Logg inn</h1>
    <div class="field"><label>E-post</label><input type="email" placeholder="deg@eksempel.no"></div>
    <div class="field"><label>Passord</label><input type="password" placeholder="••••••••••"></div>
    <button>Logg inn</button>
    <p class="footer">Har du ikke konto? <a href="#">Registrer deg</a></p>
  </div>
  <div class="tag">Mockup C — Aurora Vivid (4 blobs + conic sweep, gradient title + button, card glow)</div>
</body>
</html>
