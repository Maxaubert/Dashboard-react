<!doctype html>
<html lang="nb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login mockup A — Aurora Calm</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --indigo:#6366f1; --violet:#8b5cf6; --blue:#3b82f6; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #050507; color: #e7e7ea; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .aurora { position: fixed; inset: 0; overflow: hidden; z-index: 0; }
  .blob { position: absolute; border-radius: 50%; filter: blur(95px); opacity: 0.55; will-change: transform; }
  .b1 { width: 540px; height: 540px; background: var(--indigo); top: -130px; left: -90px;  animation: d1 26s ease-in-out infinite alternate; }
  .b2 { width: 500px; height: 500px; background: var(--violet); bottom: -150px; right: -70px; animation: d2 30s ease-in-out infinite alternate; }
  .b3 { width: 420px; height: 420px; background: var(--blue);   top: 28%; left: 56%; opacity: 0.4; animation: d3 34s ease-in-out infinite alternate; }
  @keyframes d1 { from { transform: translate(0,0) scale(1); } to { transform: translate(130px,90px) scale(1.18); } }
  @keyframes d2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-110px,-70px) scale(1.12); } }
  @keyframes d3 { from { transform: translate(0,0) scale(1); } to { transform: translate(-90px,70px) scale(0.88); } }
  .vignette { position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.55) 100%); }

  .card {
    position: relative; z-index: 2; width: 360px; max-width: calc(100vw - 32px); padding: 36px 30px;
    background: rgba(255,255,255,0.055); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
    backdrop-filter: blur(24px) saturate(140%); -webkit-backdrop-filter: blur(24px) saturate(140%);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: reveal 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes reveal { from { opacity:0; transform: scale(0.95) translateY(10px); } to { opacity:1; transform: scale(1) translateY(0); } }
  .brand { display:flex; align-items:center; gap:9px; color:var(--indigo); font-weight:700; font-size:0.95rem; margin-bottom:22px; }
  h1 { font-size:1.5rem; font-weight:700; margin-bottom:22px; letter-spacing:-0.01em; }
  label { display:block; font-size:0.78rem; color:#a1a1aa; margin-bottom:7px; }
  .field { margin-bottom:16px; }
  input { width:100%; padding:11px 13px; background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.1);
    border-radius:11px; color:#e7e7ea; font-size:0.95rem; outline:none; transition:border-color .15s, box-shadow .15s; }
  input:focus { border-color:var(--indigo); box-shadow:0 0 0 3px rgba(99,102,241,0.25); }
  button { width:100%; margin-top:6px; padding:12px; background:var(--indigo); color:#fff; border:none; border-radius:11px;
    font-size:0.95rem; font-weight:600; cursor:pointer; box-shadow:0 8px 24px rgba(99,102,241,0.35);
    transition:transform .1s, box-shadow .15s, background .15s; }
  button:hover { background:#7376f5; box-shadow:0 10px 30px rgba(99,102,241,0.5); }
  button:active { transform:translateY(1px); }
  .footer { margin-top:22px; text-align:center; font-size:0.82rem; color:#a1a1aa; }
  .footer a { color:#a5b4fc; text-decoration:none; }
  .tag { position: fixed; bottom: 14px; left: 0; right: 0; text-align: center; z-index: 3;
    font-size: 0.72rem; color: #52525b; }
</style>
</head>
<body>
  <div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
  <div class="vignette"></div>
  <div class="card">
    <div class="brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h7v7H3V3m0 11h7v7H3v-7m11-11h7v7h-7V3m0 11h7v7h-7v-7"/></svg>
      <span>Dashboard</span>
    </div>
    <h1>Logg inn</h1>
    <div class="field"><label>E-post</label><input type="email" placeholder="deg@eksempel.no"></div>
    <div class="field"><label>Passord</label><input type="password" placeholder="••••••••••"></div>
    <button>Logg inn</button>
    <p class="footer">Har du ikke konto? <a href="#">Registrer deg</a></p>
  </div>
  <div class="tag">Mockup A — Aurora Calm (3 soft blobs, slow drift, clean glass)</div>
</body>
</html>
