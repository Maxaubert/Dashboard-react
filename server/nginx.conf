# Dashboard nginx config. Deployed to /etc/nginx/sites-enabled/default by
# _deploy_frontend.py. Single server stack: HTTPS on 443 with a Let's
# Encrypt cert for 37-27-210-14.sslip.io, and an HTTP:80 block that
# upgrades everything to HTTPS (and serves ACME renewals).
#
# No more auth_basic: the React app's session-cookie login (Phase 6) is
# the gate now. The cookie is Secure, which is why HTTPS is a hard
# prerequisite -- browsers won't store a Secure cookie over plain HTTP.

# ── HTTP :80 — redirect to HTTPS, but serve ACME challenges directly ───────
server {
    listen 80 default_server;
    server_name 37-27-210-14.sslip.io _;

    # Certbot webroot renewals land here; must be reachable over plain
    # HTTP and must NOT redirect.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — the real site ─────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name 37-27-210-14.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/37-27-210-14.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/37-27-210-14.sslip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root  /opt/dashboard/www;
    index index.html;

    # ── Tools API → tools_api.py Flask service on port 5002 ─────────────────
    # Long-running ops (yt-dlp, rembg, ffmpeg) + multi-GB uploads need a
    # much larger timeout + body-size window than the regular APIs.
    location ~ ^/api/tools/ {
        proxy_pass         http://127.0.0.1:5002;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout  1800s;
        proxy_send_timeout  1800s;
        client_body_timeout 1800s;
        client_max_body_size 5G;
        proxy_request_buffering off;
    }

    # ── Dashboard API → api.py on port 3001 ──────────────────────────────────
    # Catch-all for everything else under /api/: auth, todos, plan, links,
    # home, notes (Phase 4 folded notes off the 5001 sidecar into api.py),
    # skole, wishlist, news, pdf, favicon, report.
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── React SPA static files ────────────────────────────────────────────────
    # try_files falls through to /index.html for unknown URLs so React Router
    # can handle them (e.g. hard refreshing /todo or landing on /login).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for hashed Vite asset bundles — filenames change
    # every build so cache invalidation is automatic.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
}
