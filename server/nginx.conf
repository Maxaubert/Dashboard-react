server {
    listen 80 default_server;
    server_name _;

    root  /opt/dashboard/www;
    index index.html;

    # ── Password protection ────────────────────────────────────────────────────
    # Browser saves these credentials → only typed once per device
    auth_basic           "Dashboard";
    auth_basic_user_file /etc/nginx/.dashboard_passwd;

    # ── Notes API → notes_api.py Flask service on port 5001 ──────────────────
    # Specific endpoints first so they take precedence over the catch-all.
    # `=` is exact match, `~` is regex with prefix.
    location = /api/notes {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
    location ~ ^/api/notes/ {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
    location = /api/cart {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── Tools API → tools_api.py Flask service on port 5002 ─────────────────
    # Long-running operations (yt-dlp video pulls, rembg, ffmpeg conversion)
    # need a much larger timeout window than the regular APIs. Body size
    # raised to 5 GB so users can upload multi-GB videos for conversion;
    # timeouts raised to 30 minutes to cover long transcodes + big uploads.
    location ~ ^/api/tools/ {
        proxy_pass         http://127.0.0.1:5002;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout  1800s;
        proxy_send_timeout  1800s;
        client_body_timeout 1800s;
        client_max_body_size 5G;
        proxy_request_buffering off;
    }

    # ── Dashboard API → api.py on port 3001 ──────────────────────────────────
    # Catch-all for everything else under /api/: todos, plan, links, skole,
    # wishlist, news, pdf, favicon.
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── React SPA static files ────────────────────────────────────────────────
    # try_files falls through to /index.html for unknown URLs so React Router
    # can handle them (e.g. hard refreshing /todo).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for hashed Vite asset bundles — filenames change
    # every build so cache invalidation is automatic.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
}
