<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<title>Todo complete — sound variants</title>
<style>
  :root {
    --color-bg: #050505;
    --color-surface: #0e0e0e;
    --color-border: rgba(255,255,255,0.07);
    --color-text: #e8e8e2;
    --color-text-muted: #505050;
    --color-text-dim: #888888;
    --accent: #60a5fa;
    font-family: Inter, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; color: var(--color-text); }
  body {
    padding: 32px 24px 120px;
    background: #030304;
    background-image:
      linear-gradient(rgba(255,255,255,0.014) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);
    background-size: 34px 34px;
    max-width: 720px; margin: 0 auto;
  }
  h1 { font-size: 1.1rem; letter-spacing: .12em; text-transform: uppercase; color: var(--color-text-dim); margin: 0 0 6px; font-weight: 700; }
  p.lede { color: var(--color-text-muted); margin: 0 0 28px; font-size: .85rem; }

  .card {
    display: flex; align-items: center; gap: 18px;
    padding: 18px 22px; margin-bottom: 14px;
    background: rgba(0,0,0,.4);
    border: 1px solid var(--color-border);
    border-radius: 14px;
  }
  .card .meta { flex: 1; }
  .card .name { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
  .card .desc { font-size: .78rem; color: var(--color-text-dim); line-height: 1.45; }

  .check {
    width: 36px; height: 36px; border-radius: 10px;
    border: 2px solid rgba(96,165,250,0.55);
    background: transparent;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s, transform .1s;
    color: var(--accent);
    font-size: 1.2rem;
  }
  .check:hover { background: rgba(96,165,250,0.1); }
  .check:active { transform: scale(0.92); }

  .play-btn {
    padding: 8px 14px;
    border-radius: 8px;
    background: var(--accent);
    color: #0a1420;
    border: 1px solid var(--accent);
    font-weight: 700;
    font-size: .82rem;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Todo complete — sound variants</h1>
<p class="lede">Seven procedurally-generated sound options. Click any checkbox to preview. All built with Web Audio API (no files — exactly what would ship in the React app).</p>

<div id="list"></div>

<script>
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  function env(gain, t0, attack, decay, sustain=0, release=0) {
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(1, t0 + attack);
    gain.gain.exponentialRampToValueAtTime(Math.max(sustain, 0.0001), t0 + attack + decay);
    if (release) gain.gain.exponentialRampToValueAtTime(0.0001, t0 + attack + decay + release);
  }

  function tone({ freq, type='sine', dur=0.2, volume=0.2, sweep=null }) {
    const t0 = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (sweep) osc.frequency.exponentialRampToValueAtTime(sweep, t0 + dur);
    gain.gain.setValueAtTime(volume, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }

  function noise({ dur=0.08, volume=0.15, filterFreq=2000, filterQ=6 }) {
    const t0 = ctx.currentTime;
    const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0; i<d.length; i++) d[i] = (Math.random()*2-1);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = filterFreq; filter.Q.value = filterQ;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(volume, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    src.connect(filter).connect(gain).connect(ctx.destination);
    src.start(t0);
  }

  // ─── SOUND DEFINITIONS ────────────────────────────────────────────────
  const sounds = [
    {
      name: 'A · Soft pop',
      desc: 'Short low sine blip. Subtle, background-friendly, unobtrusive.',
      play: () => tone({ freq: 520, type: 'sine', dur: 0.12, volume: 0.22, sweep: 280 }),
    },
    {
      name: 'B · Satisfying tick',
      desc: 'Filtered noise burst. Feels like a mechanical click — physical, productive.',
      play: () => {
        noise({ dur: 0.05, volume: 0.3, filterFreq: 1800, filterQ: 8 });
        setTimeout(() => tone({ freq: 600, type: 'triangle', dur: 0.04, volume: 0.1 }), 5);
      },
    },
    {
      name: 'C · Chime',
      desc: 'Two-note sine chime (C5 → E5). Cheerful, reward-y — rings briefly.',
      play: () => {
        tone({ freq: 523, type: 'sine', dur: 0.3, volume: 0.18 });
        setTimeout(() => tone({ freq: 659, type: 'sine', dur: 0.4, volume: 0.18 }), 80);
      },
    },
    {
      name: 'D · Rising chirp',
      desc: 'Fast pitch sweep upward. Energetic — "task launched".',
      play: () => tone({ freq: 400, type: 'triangle', dur: 0.18, volume: 0.22, sweep: 1100 }),
    },
    {
      name: 'E · Bubble',
      desc: 'Down-sweep square through lowpass. Bloopy / playful.',
      play: () => tone({ freq: 900, type: 'square', dur: 0.12, volume: 0.12, sweep: 280 }),
    },
    {
      name: 'F · Woodblock',
      desc: 'Short low-filtered noise. Like a marker ticking off a physical list.',
      play: () => noise({ dur: 0.06, volume: 0.4, filterFreq: 700, filterQ: 12 }),
    },
    {
      name: 'G · Success arpeggio',
      desc: 'Three-note rising arpeggio (C5–E5–G5). Feels most accomplishment-y.',
      play: () => {
        tone({ freq: 523, type: 'triangle', dur: 0.12, volume: 0.18 });
        setTimeout(() => tone({ freq: 659, type: 'triangle', dur: 0.12, volume: 0.18 }), 70);
        setTimeout(() => tone({ freq: 784, type: 'triangle', dur: 0.2,  volume: 0.2 }),  140);
      },
    },
  ];

  const list = document.getElementById('list');
  sounds.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <button class="check" title="Preview">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
      <div class="meta">
        <div class="name">${s.name}</div>
        <div class="desc">${s.desc}</div>
      </div>
      <button class="play-btn">▶ Play</button>
    `;
    const fire = () => {
      if (ctx.state === 'suspended') ctx.resume();
      s.play();
    };
    card.querySelector('.check').addEventListener('click', fire);
    card.querySelector('.play-btn').addEventListener('click', fire);
    list.appendChild(card);
  });
</script>

</body>
</html>
